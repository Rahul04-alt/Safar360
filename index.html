<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description"
    content="Safar360 - Your global travel companion. Discover hidden gems, track flights, and plan your perfect journey with VR previews." />
  <meta name="theme-color" content="#0369a1" />

  <!-- Social Sharing (Open Graph) -->
  <meta property="og:title" content="Safar360 - Explore the World" />
  <meta property="og:description"
    content="Discover hidden gems, plan itineraries, and store your documents securely in our Travel Wallet." />
  <meta property="og:image" content="/og-image.jpg" />
  <meta property="og:type" content="website" />

  <!-- CRITICAL: Kill stale service workers BEFORE anything loads -->
  <!-- This fixes blank page on normal reload after redeployment -->
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(function (registrations) {
        for (let registration of registrations) {
          registration.unregister();
        }
      });
      caches.keys().then(function (cacheNames) {
        cacheNames.forEach(function (cacheName) {
          caches.delete(cacheName);
        });
      });
    }
  </script>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap"
    rel="stylesheet" />

  <title>Safar360 - Explore the World</title>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
